<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lector</title>
    <meta
      name="description"
      content="Pega el último escaneo y véalo al instante en el PC y el móvil con sincronización en tiempo real."
    />
    <style>
      :root {
        font-family: "Segoe UI Variable", "Aptos", "Trebuchet MS", sans-serif;
        line-height: 1.5;
        font-weight: 400;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        --surface: #f3f4f6;
        --surface-2: #ffffff;
        --surface-3: #e5e7eb;
        --text: #111827;
        --text-soft: #4b5563;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --success: #16a34a;
        --warning: #d97706;
        --shadow: none;
        --panel-border: #d1d5db;
      }

      body[data-theme='dark'] {
        color-scheme: dark;
        --surface: #111827;
        --surface-2: #1f2937;
        --surface-3: #374151;
        --text: #f9fafb;
        --text-soft: #cbd5e1;
        --accent: #60a5fa;
        --accent-strong: #93c5fd;
        --success: #34d399;
        --warning: #fbbf24;
        --shadow: none;
        --panel-border: #374151;
      }

      body[data-theme='light'] {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background: var(--surface);
        color: var(--text);
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      #app {
        min-height: 100vh;
      }

      .shell {
        width: min(1024px, calc(100% - 24px));
        margin: 0 auto;
        padding: 20px 0 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 14px;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 0.78fr;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        background: var(--surface-2);
        box-shadow: var(--shadow);
      }

      .editor-panel,
      .display-panel,
      .history-panel {
        padding: 18px;
      }

      .field-label {
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-soft);
      }

      #scan-input {
        width: 100%;
        min-height: 180px;
        margin-top: 14px;
        padding: 18px 20px;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        background: var(--surface-2);
        color: var(--text);
        resize: vertical;
        outline: none;
        transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      }

      #scan-input::placeholder {
        color: var(--text-soft);
      }

      #scan-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 14px;
      }

      .primary,
      .secondary,
      .link-button,
      .theme-button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        transition: transform 140ms ease, background 140ms ease, color 140ms ease, opacity 140ms ease;
      }

      .primary {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      .secondary {
        background: var(--surface-3);
        color: var(--text);
      }

      .link-button {
        padding-inline: 0;
        background: transparent;
        color: var(--accent-strong);
      }

      .theme-button {
        background: var(--surface-3);
        color: var(--text);
      }

      .primary:hover,
      .secondary:hover,
      .link-button:hover,
      .theme-button:hover,
      .history-item:hover {
        transform: translateY(-1px);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--panel-border);
        background: var(--surface-3);
        color: var(--text-soft);
        font-size: 0.85rem;
      }

      .chip[data-tone='success'] {
        color: #ffffff;
        background: var(--success);
      }

      .chip[data-tone='warning'] {
        color: #ffffff;
        background: var(--warning);
      }

      .scan-output {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 220px;
        margin-top: 16px;
        padding: 20px;
        border-radius: 18px;
        background: var(--surface-3);
        color: var(--text);
        font-size: clamp(1.3rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: 0.03em;
        text-align: center;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .scan-output[data-empty='true'] {
        color: var(--text-soft);
        font-size: clamp(1rem, 2.6vw, 1.4rem);
        font-weight: 600;
      }

      .meta {
        display: grid;
        gap: 6px;
        margin-top: 16px;
        color: var(--text-soft);
        font-size: 0.92rem;
      }

      .history-panel {
        margin-top: 20px;
      }

      .history-list {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .history-empty {
        margin: 0;
        padding: 12px 0 4px;
        color: var(--text-soft);
      }

      .history-item {
        display: grid;
        grid-template-columns: 56px 1fr auto;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        background: var(--surface-2);
        color: var(--text);
        text-align: left;
      }

      .history-index {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .history-value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .history-copy {
        color: var(--accent-strong);
        font-size: 0.9rem;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .theme-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .theme-button span {
        font-size: 0.9rem;
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100%, calc(100% - 16px));
          padding-top: 12px;
        }

        .editor-panel,
        .display-panel,
        .history-panel {
          padding: 16px;
          border-radius: 16px;
        }

        .history-item {
          grid-template-columns: 1fr;
        }

        .history-index,
        .history-copy {
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const STORAGE_KEY = 'lector-qr:last-scan'
      const HISTORY_KEY = 'lector-qr:history'
      const THEME_KEY = 'lector-qr:theme'
      const MAX_HISTORY = 6
      const ROOM_NAME = 'lector-principal'
      const API_URL = `/api/scan-state?room=${encodeURIComponent(ROOM_NAME)}`

      const app = document.querySelector('#app')

      app.innerHTML = `
        <main class="shell">
          <div class="topbar">
            <button id="theme-toggle" class="theme-button" type="button" aria-label="Cambiar tema">
              <span id="theme-icon">☾</span>
              <span id="theme-label">Oscuro</span>
            </button>
          </div>

          <section class="workspace">
            <div class="panel editor-panel">
              <label class="field-label" for="scan-input">Último escaneo</label>
              <textarea id="scan-input" rows="4" spellcheck="false" placeholder="Pega aquí el código de barras o QR..."></textarea>
              <div class="actions">
                <button id="paste-button" class="secondary" type="button">Pegar texto</button>
                <button id="copy-button" class="primary" type="button">Copiar texto</button>
                <button id="clear-button" class="secondary" type="button">Limpiar</button>
              </div>
            </div>

            <div class="panel display-panel">
              <div class="status-row">
                <span class="field-label">Vista instantánea</span>
                <span id="status-chip" class="chip">Listo</span>
              </div>
              <output id="scan-output" class="scan-output" aria-live="polite">Pega un código para verlo aquí.</output>
              <div class="meta">
                <span>Se sincroniza en tiempo real entre todos los dispositivos con la misma sala.</span>
                <span>Haz clic en un elemento del historial para recuperarlo.</span>
              </div>
            </div>
          <section class="panel history-panel">
            <div class="panel-head">
              <span class="field-label">Historial reciente</span>
              <button id="clear-history" class="link-button" type="button">Vaciar historial</button>
            </div>
            <div id="history-list" class="history-list"></div>
          </section>
        </main>
      `

      const input = document.querySelector('#scan-input')
      const output = document.querySelector('#scan-output')
      const pasteButton = document.querySelector('#paste-button')
      const copyButton = document.querySelector('#copy-button')
      const clearButton = document.querySelector('#clear-button')
      const clearHistoryButton = document.querySelector('#clear-history')
      const historyList = document.querySelector('#history-list')
      const statusChip = document.querySelector('#status-chip')
      const themeToggle = document.querySelector('#theme-toggle')
      const themeIcon = document.querySelector('#theme-icon')
      const themeLabel = document.querySelector('#theme-label')

      let pollTimer = null
      let suppressBroadcast = false
      let lastSeenValue = ''

      const applyTheme = (theme) => {
        const nextTheme = theme === 'light' ? 'light' : 'dark'
        document.body.dataset.theme = nextTheme
        localStorage.setItem(THEME_KEY, nextTheme)
        themeIcon.textContent = nextTheme === 'light' ? '☀' : '☾'
        themeLabel.textContent = nextTheme === 'light' ? 'Claro' : 'Oscuro'
      }

      applyTheme(localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'))

      const readHistory = () => {
        try {
          const raw = localStorage.getItem(HISTORY_KEY)
          const parsed = raw ? JSON.parse(raw) : []
          return Array.isArray(parsed) ? parsed.filter((item) => typeof item === 'string') : []
        } catch {
          return []
        }
      }

      const rememberScan = (value) => {
        const trimmed = value.trim()

        if (!trimmed) {
          return
        }

        const currentHistory = readHistory().filter((item) => item !== trimmed)
        const nextHistory = [trimmed, ...currentHistory].slice(0, MAX_HISTORY)
        localStorage.setItem(HISTORY_KEY, JSON.stringify(nextHistory))
        renderHistory()
      }

      const setStatus = (message, tone = 'ready') => {
        statusChip.textContent = message
        statusChip.dataset.tone = tone
      }

      const updateOutput = (value) => {
        const trimmed = value.trim()

        if (trimmed.length === 0) {
          output.textContent = 'Pega un código para verlo aquí.'
          output.dataset.empty = 'true'
          setStatus('Listo')
          return
        }

        output.textContent = trimmed
        output.dataset.empty = 'false'
        setStatus('En pantalla', 'success')
      }

      const syncValue = (value, persist = true) => {
        input.value = value
        updateOutput(value)

        if (persist) {
          localStorage.setItem(STORAGE_KEY, value)
        }
      }

      const renderHistory = () => {
        const history = readHistory()
        historyList.innerHTML = ''

        if (history.length === 0) {
          historyList.innerHTML = '<p class="history-empty">Todavía no hay códigos guardados.</p>'
          return
        }

        history.forEach((item, index) => {
          const button = document.createElement('button')
          button.type = 'button'
          button.className = 'history-item'
          button.innerHTML = `
            <span class="history-index">${String(index + 1).padStart(2, '0')}</span>
            <span class="history-value"></span>
            <span class="history-copy">Copiar</span>
          `

          const valueNode = button.querySelector('.history-value')
          if (valueNode) {
            valueNode.textContent = item
          }

          button.addEventListener('click', async () => {
            syncValue(item)
            try {
              await navigator.clipboard.writeText(item)
              setStatus('Copiado', 'success')
            } catch {
              setStatus('No se pudo copiar', 'warning')
            }
          })

          historyList.appendChild(button)
        })
      }

      const applyRemoteState = (value) => {
        suppressBroadcast = true
        syncValue(value, true)
        suppressBroadcast = false
      }

      const fetchSharedValue = async () => {
        const response = await fetch(API_URL, {
          headers: { Accept: 'application/json' },
        })

        if (!response.ok) {
          throw new Error('No se pudo leer el valor compartido.')
        }

        const data = await response.json()
        return typeof data?.value === 'string' ? data.value : ''
      }

      const saveSharedValue = async (value) => {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value }),
        })

        if (!response.ok) {
          throw new Error('No se pudo guardar el valor compartido.')
        }
      }

      const sendValue = async (value) => {
        const trimmed = value.trim()

        if (!trimmed) {
          return
        }

        await saveSharedValue(trimmed)
        lastSeenValue = trimmed
        rememberScan(trimmed)
      }

      const stopPolling = () => {
        if (pollTimer) {
          clearInterval(pollTimer)
        }

        pollTimer = null
      }

      const startPolling = async () => {
        stopPolling()

        try {
          const value = await fetchSharedValue()
          if (value) {
            lastSeenValue = value
            applyRemoteState(value)
            rememberScan(value)
          }
        } catch {
          setStatus('Sin conexión', 'warning')
        }

        pollTimer = window.setInterval(async () => {
          try {
            const nextValue = await fetchSharedValue()

            if (nextValue && nextValue !== lastSeenValue) {
              lastSeenValue = nextValue
              applyRemoteState(nextValue)
              rememberScan(nextValue)
              setStatus('En vivo', 'success')
            }
          } catch {
            setStatus('Sin conexión', 'warning')
          }
        }, 700)
      }

      input.value = localStorage.getItem(STORAGE_KEY) ?? ''
      syncValue(input.value, false)
      renderHistory()

      startPolling()

      input.addEventListener('input', () => {
        syncValue(input.value)

        if (!suppressBroadcast) {
          const trimmed = input.value.trim()

          if (trimmed) {
            rememberScan(trimmed)
            sendValue(trimmed).catch(() => {
              setStatus('Sin conexión', 'warning')
            })
          }
        }
      })

      copyButton.addEventListener('click', async () => {
        const value = input.value.trim()

        if (!value) {
          setStatus('Nada que copiar', 'warning')
          input.focus()
          return
        }

        try {
          await navigator.clipboard.writeText(value)
          setStatus('Copiado', 'success')
          rememberScan(value)
          sendValue(value).catch(() => {
            setStatus('Sin conexión', 'warning')
          })
        } catch {
          setStatus('No se pudo copiar', 'warning')
        }
      })

      pasteButton.addEventListener('click', async () => {
        try {
          const clipboardText = await navigator.clipboard.readText()
          if (!clipboardText) {
            setStatus('Portapapeles vacío', 'warning')
            input.focus()
            return
          }

          syncValue(clipboardText)
          rememberScan(clipboardText)
          sendValue(clipboardText).catch(() => {
            setStatus('Sin conexión', 'warning')
          })
          setStatus('Pegado', 'success')
          input.focus()
        } catch {
          setStatus('No se pudo pegar', 'warning')
          input.focus()
        }
      })

      clearButton.addEventListener('click', () => {
        syncValue('')
        localStorage.removeItem(STORAGE_KEY)
        input.focus()
      })

      clearHistoryButton.addEventListener('click', () => {
        localStorage.removeItem(HISTORY_KEY)
        renderHistory()
      })

      themeToggle.addEventListener('click', () => {
        const currentTheme = document.body.dataset.theme === 'light' ? 'light' : 'dark'
        applyTheme(currentTheme === 'light' ? 'dark' : 'light')
      })

      window.addEventListener('beforeunload', stopPolling)

      input.focus()
    </script>
  </body>
</html>
